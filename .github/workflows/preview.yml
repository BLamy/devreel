name: PR preview (Cloudflare)

# Per-PR preview: build the app, upload a non-prod Cloudflare version with a
# stable per-branch alias, and post a sticky comment with the link. Gated on the
# Cloudflare secrets (posts a "pending" note until they're set).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cf-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Check Cloudflare credentials are configured
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Note that previews aren't configured yet
        if: steps.gate.outputs.ready != 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cf-preview
          message: |
            ### ⏳ Preview pending
            Add the `CLOUDFLARE_API_TOKEN` + `CLOUDFLARE_ACCOUNT_ID` repo secrets to enable
            per-PR previews. Once set, each push here deploys a live preview link.

      - if: steps.gate.outputs.ready == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - if: steps.gate.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - if: steps.gate.outputs.ready == 'true'
        run: npm install --no-audit --no-fund
      - if: steps.gate.outputs.ready == 'true'
        run: npm run build

      - name: Derive a stable preview alias from the branch
        id: alias
        if: steps.gate.outputs.ready == 'true'
        run: |
          # CF preview aliases must be a DNS label: lowercase [a-z0-9-], <=28 chars.
          alias=$(printf '%s' "${{ github.head_ref }}" \
            | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-28 | sed 's/-*$//')
          echo "alias=$alias" >> "$GITHUB_OUTPUT"

      - name: Upload preview version to Cloudflare
        id: deploy
        if: steps.gate.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ steps.alias.outputs.alias }}

      - name: Resolve preview URL + changed lesson slugs
        id: meta
        if: steps.gate.outputs.ready == 'true'
        env:
          WRANGLER_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: |
          set -euo pipefail
          url=$(printf '%s' "$WRANGLER_OUTPUT" \
            | grep -oE 'https://[a-z0-9.-]*workers\.dev' | head -n1 || true)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          slugs=$(git diff origin/main...HEAD --name-only \
            | grep -E '^public/generated/[^/]+/' \
            | sed -E 's|public/generated/([^/]+)/.*|\1|' | sort -u || true)
          {
            echo "links<<EOF"
            if [ -n "$slugs" ] && [ -n "$url" ]; then
              while IFS= read -r s; do
                [ -z "$s" ] && continue
                echo "- [\`$s\`]($url/?lesson=$s)"
              done <<< "$slugs"
            else
              echo "- $url"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post / update the preview comment
        if: steps.gate.outputs.ready == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cf-preview
          message: |
            ### 📺 Preview deployed

            **Feed:** ${{ steps.meta.outputs.url }}

            Lessons in this PR:
            ${{ steps.meta.outputs.links }}

            _Updated on each push._
